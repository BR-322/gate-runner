# Qwen3.5 dense models. Uncomment exactly one model.
# model = "Qwen/Qwen3.5-0.8B"
# model = "Qwen/Qwen3.5-2B"
model = "Qwen/Qwen3.5-4B"
# model = "Qwen/Qwen3.5-9B"

num_examples = 20
rollouts_per_example = 3
max_tokens = 1024
temperature = 0.7
sampling_args = { extra_body = { chat_template_kwargs = { enable_thinking = false } } }
# Raise num_examples to 200 after the preflight passes sample inspection.

[[eval]]
env_id = "br-322/gate-runner"
env_args = { dataset = "ecb_fx", eval_examples = 200 }

# Hosted Training docs: https://docs.primeintellect.ai/hosted-training
