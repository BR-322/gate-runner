# Llama 3.2 models. Uncomment exactly one model.
model = "meta-llama/Llama-3.2-1B-Instruct"
# model = "meta-llama/Llama-3.2-3B-Instruct"

max_steps = 100
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 1024

# Gate Runner training environment.
[[env]]
id = "br-322/gate-runner"
args = { dataset = "ecb_fx_carry", train_examples = 400, eval_examples = 200 }

# Online evaluations during training. Uncomment to add [[eval.env]] blocks.

