# gpt-oss models. Uncomment exactly one model.
model = "openai/gpt-oss-20b"
# model = "openai/gpt-oss-120b"

max_steps = 100
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 1024
reasoning_effort = "low"

# Gate Runner training environment.
[[env]]
id = "br-322/gate-runner"

# Online evaluations during training. Uncomment to add [[eval.env]] blocks.

