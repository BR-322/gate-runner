# Nemotron 3 models. Uncomment exactly one model.
model = "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16"
# model = "nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-BF16"  # pragma: allowlist secret

max_steps = 100
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 1024
enable_thinking = false

# Gate Runner training environment.
[[env]]
id = "br-322/gate-runner"
args = { dataset = "ecb_fx", train_examples = 400, eval_examples = 200 }

