# Qwen3.5 dense models. Uncomment exactly one model.
# model = "Qwen/Qwen3.5-0.8B"
# model = "Qwen/Qwen3.5-2B"
model = "Qwen/Qwen3.5-4B"
# model = "Qwen/Qwen3.5-9B"

max_steps = 100
batch_size = 128
rollouts_per_example = 8

[sampling]
max_tokens = 1024
enable_thinking = false

# Gate Runner training environment.
[[env]]
id = "br-322/gate-runner"
args = { dataset = "ecb_fx", train_examples = 400, eval_examples = 200 }

# Online evaluations during training. Uncomment to add [[eval.env]] blocks.

